name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Exact version matching the dev machine so CI's bundled npm
          # agrees with the committed lockfile (newer npm majors compute
          # a different ideal tree and fail `npm ci`).
          node-version: 22.12.0
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
